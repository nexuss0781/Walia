set timeout=3 
set default=0 

menuentry "Walia Sovereign OS (v3.0.0)" { 
    # Load the kernel at 1MB 
    multiboot2 /boot/kernel.bin 
    
    # Set video mode to text (standard VGA) 
    set gfxpayload=text 
    
    # Boot the kernel 
    boot 
} 

menuentry "System Reboot" { 
    reboot 
} 

menuentry "System Shutdown" { 
    halt 
} 
